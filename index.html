<header>

        <div id="mySlider" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000" data-bs-pause="hover">

    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#mySlider" data-bs-slide="next">
