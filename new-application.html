<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Новая заявка — Корочки.есть</title>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="container">
                <h2>Корочка.ЕСТЬ</h2>
                <div class="navbar-collapse">
                    <a href="index.html" class="navbar-brand">Главная</a>
                    <a href="login.html" class="navbar-brand">Войти</a>
                </div>
            </div>
        </nav>
    </header>


    <main class="pb-5">
        <div class="container">
            <div class="text-left">

        <h1 class="display-4">Новая заявка на обучение</h1>

    <form method="post">
        <div>
            <label>Наименование курса:</label><br>
            <input type="text" class="form-control w-25" name="course" placeholder="Например: Продвинутый JavaScript" required><br>
        </div>
        <div>
            <label>Желаемая дата начала обучения:</label><br>
            <input type="date" class="form-control w-25" name="start_date" required><br>
        </div>
        <div>
            <span>Способ оплаты:</span><br>
            <label><input type="radio"  name="payment" value="cash" checked> Наличными</label><br>
            <label><input type="radio" name="payment" value="phone"> Перевод по номеру телефона</label><br>
            <br>
        </div>
        <div>
            <button type="submit" class="btn btn-primary">Отправить заявку</button>
            <a href="applications.html" class="btn btn-secondary">Вернуться к моим заявкам</a>

        </div>
    </form>

    </div>
        </div>

    </main>

    <footer class="border-top footer text-muted mt-5">
        <div class="container">
            <div class="text-center">
                <p>2026 - Хайдарова Алина</p>
            </div>
            
        </div>

    </footer>
    
</body>
</html>
