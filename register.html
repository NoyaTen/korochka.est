<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Регистрация — Корочки.есть</title>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="container">
                <h2>Корочка.ЕСТЬ</h2>
                <div class="navbar-collapse">
                    <a href="index.html" class="navbar-brand">Главная</a>
                    <a href="login.html" class="navbar-brand">Войти</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="pb-5">
        <div class="container">
             <div class="text-left">

            <h1 class="display-4">Регистрация</h1>

        <form method="post">
            <div>
                <label>Логин (латиница и цифры, не менее 6 символов):</label><br>
                <input type="text" class="form-control w-25" name="login" required pattern="[A-Za-z0-9]{6,}" placeholder="user123"><br>
            </div>
            <div>
                <label for="reg-password">Пароль (минимум 8 символов):</label><br>
                <input type="password" class="form-control w-25" name="password" required minlength="8" placeholder="12345678"><br>
            </div>
            <div>
                <label for="reg-fio">ФИО (кириллица, прописью):</label><br>
                <input type="text" class="form-control w-25" name="fio" required pattern="[А-Яа-яЁё\s]+" placeholder="Иванов Иван Иванович"><br>
            </div>
            <div>
                <label for="reg-phone">Телефон (формат: 8(ХХХ)ХХХ-ХХ-ХХ):</label><br>
                <input type="tel" class="form-control w-25" name="phone" required pattern="8\(\d{3}\)\d{3}-\d{2}-\d{2}" placeholder="8(999)123-45-67"><br>
            </div>
            <div>
                <label for="reg-email">Адрес электронной почты:</label><br>
                <input type="email" class="form-control w-25" name="email" required placeholder="ivan@mail.ru"><br>
            </div>
            <div>
                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                <a href="login.html" class="btn btn-secondary">Уже есть аккаунт? Войти</a>
            </div>
        </form>
        </div>
        </div>
           
    </main>

    <footer class="border-top footer text-muted mt-5">
        <div class="container">
            <div class="text-center">
                <p>2026 - Хайдарова Алина</p>
            </div>
            
        </div>

    </footer>

</body>
</html>
